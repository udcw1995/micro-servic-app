server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Forward auth API requests to auth-service
    location /api/auth/ {
        proxy_pass http://auth-service:3001/api/auth/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Forward user API requests to user-service
    location /api/users/ {
        proxy_pass http://user-service:3000/api/users/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Forward role API requests to user-service
    location /api/roles/ {
        proxy_pass http://user-service:3000/api/roles/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Forward upload API requests to upload-service
    location /api/uploads/ {
        proxy_pass http://upload-service:3002/api/uploads/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        client_max_body_size 6M;
    }

    # Forward team API requests to ticket-service
    location /api/teams/ {
        proxy_pass http://ticket-service:3003/api/teams/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Forward instance API requests to ticket-service
    location /api/instances/ {
        proxy_pass http://ticket-service:3003/api/instances/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}
